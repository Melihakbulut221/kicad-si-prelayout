name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: CLI smoke
        run: |
          si-prelayout validate examples/series_terminated.si.yml
          si-prelayout analyze examples/ibis_series_terminated.si.yml -j /tmp/out.json
